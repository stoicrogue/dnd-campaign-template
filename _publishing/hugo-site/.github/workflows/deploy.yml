name: Deploy Hugo Site

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: true  # Fetch Hugo themes (required if using git submodules for theme)
        fetch-depth: 0    # Fetch all history for .GitInfo and .Lastmod

    - name: Setup Hugo
      uses: peaceiris/actions-hugo@v2
      with:
        hugo-version: 'latest'
        extended: true

    - name: Build Hugo site
      run: hugo --minify

    # -------------------------------------------------------------------------
    # DreamHost deployment via rsync over SSH.
    # Replace this section if deploying to a different host.
    #
    # Required GitHub Secrets (Settings → Secrets → Actions):
    #   DREAMHOST_SSH_KEY  — Ed25519 private key (contents of id_ed25519 file)
    #   DREAMHOST_HOST     — SSH hostname (e.g. example.dreamhost.com)
    #   DREAMHOST_USER     — SSH username
    #   DREAMHOST_PATH     — Remote path (e.g. /home/user/example.com/public)
    # -------------------------------------------------------------------------
    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.DREAMHOST_SSH_KEY }}" > ~/.ssh/id_ed25519
        chmod 600 ~/.ssh/id_ed25519
        chmod 700 ~/.ssh
        ssh-keyscan -H ${{ secrets.DREAMHOST_HOST }} >> ~/.ssh/known_hosts

        # Test the SSH connection
        ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no -o ConnectTimeout=10 \
          ${{ secrets.DREAMHOST_USER }}@${{ secrets.DREAMHOST_HOST }} "echo 'SSH connection successful'"

    - name: Deploy to DreamHost
      run: |
        rsync -avz --delete \
          -e "ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no" \
          public/ \
          ${{ secrets.DREAMHOST_USER }}@${{ secrets.DREAMHOST_HOST }}:${{ secrets.DREAMHOST_PATH }}

    - name: Cleanup
      run: rm -f ~/.ssh/id_ed25519
